<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apuestas de Valor — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0d14;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .login-card {
      background: #171e2e;
      border: 1px solid #232d45;
      border-top: 3px solid #22c55e;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }
    .login-title {
      font-size: 20px;
      font-weight: 800;
      color: #22c55e;
      margin-bottom: 6px;
    }
    .login-sub {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: #111520;
      border: 1px solid #232d45;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 10px 14px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      margin-bottom: 16px;
    }
    input[type="text"]:focus,
    input[type="password"]:focus { border-color: #3b82f6; }
    button {
      width: 100%;
      background: #22c55e;
      color: #0a0d14;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      margin-top: 4px;
    }
    button:hover { background: #16a34a; }
    .error {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      color: #ef4444;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-title">⚡ Value Bets</div>
    <div class="login-sub">Ingresá tus credenciales para continuar</div>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <label>Usuario</label>
      <input type="text" name="usuario" autofocus placeholder="usuario" autocomplete="username" />
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" />
      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
